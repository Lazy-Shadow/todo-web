<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .modal-overlay { backdrop-filter: blur(4px); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="app" class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
      <div class="p-4 border-b border-gray-200">
        <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
          <i class="fas fa-check-circle text-purple-600"></i>
          Todo App
        </h1>
      </div>
      
      <nav class="flex-1 p-2">
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left mb-1 text-purple-600 bg-purple-50" data-tab="todos">
          <i class="fas fa-list-check w-5"></i>
          <span>Todos</span>
        </button>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left mb-1 text-gray-600 hover:bg-gray-50" data-tab="notes">
          <i class="fas fa-sticky-note w-5"></i>
          <span>Notes</span>
        </button>
      </nav>

      <!-- Stats Panel (for todos) -->
      <div id="stats-panel" class="p-4 border-t border-gray-200">
        <h3 class="text-sm font-semibold text-gray-500 mb-3">Overview</h3>
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-600">Total</span>
            <span class="font-bold text-blue-600" id="total-count">0</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-600">Active</span>
            <span class="font-bold text-orange-600" id="active-count">0</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-600">Completed</span>
            <span class="font-bold text-green-600" id="done-count">0</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
        <h2 id="page-title" class="text-2xl font-bold text-gray-800">Todos</h2>
        <div class="flex items-center gap-3">
          <div id="selection-actions" class="hidden items-center gap-2">
            <span id="selected-count" class="text-sm text-gray-500">0 selected</span>
            <button id="delete-selected" class="px-3 py-1.5 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600">
              <i class="fas fa-trash mr-1"></i> Delete
            </button>
            <button id="cancel-selection" class="px-3 py-1.5 bg-gray-200 text-gray-700 rounded-lg text-sm hover:bg-gray-300">
              Cancel
            </button>
          </div>
          <div class="relative" id="filter-container">
            <button id="filter-btn" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 flex items-center gap-2">
              <i class="fas fa-filter text-gray-600"></i>
              <span class="text-sm">Filter</span>
            </button>
            <div id="filter-menu" class="hidden absolute right-0 mt-2 w-40 bg-white rounded-lg shadow-lg border border-gray-200 z-50">
              <button class="filter-option w-full text-left px-4 py-2 hover:bg-gray-100 text-sm" data-filter="all">All</button>
              <button class="filter-option w-full text-left px-4 py-2 hover:bg-gray-100 text-sm" data-filter="active">Active</button>
              <button class="filter-option w-full text-left px-4 py-2 hover:bg-gray-100 text-sm" data-filter="completed">Completed</button>
            </div>
          </div>
        </div>
      </header>

      <!-- Search Bar -->
      <div class="px-6 py-4 bg-white border-b border-gray-100">
        <div class="relative max-w-md">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" id="search-input" placeholder="Search..." 
            class="w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
          <button id="clear-search" class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <!-- Content Area -->
      <div class="flex-1 overflow-y-auto p-6">
        <!-- Todo List -->
        <div id="todos-panel" class="space-y-3 max-w-4xl">
          <!-- Tasks will be rendered here -->
        </div>

        <!-- Notes Grid -->
        <div id="notes-panel" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Notes will be rendered here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center h-64 text-gray-400">
          <i class="fas fa-inbox text-5xl mb-4"></i>
          <p id="empty-message" class="text-center">No items yet</p>
        </div>
      </div>
    </main>
  </div>

  <!-- FAB -->
  <button id="fab" class="fixed bottom-6 right-6 bg-purple-600 text-white p-4 rounded-full shadow-lg hover:bg-purple-700 transition transform hover:scale-105">
    <i class="fas fa-plus text-xl"></i>
  </button>

  <!-- Task Modal -->
  <div id="task-modal" class="hidden fixed inset-0 bg-black/50 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl">
      <div class="px-6 py-5 border-b border-gray-100">
        <div class="flex items-center justify-between">
          <h2 id="task-modal-title" class="text-xl font-bold text-gray-800">Add Task</h2>
          <button id="close-task-modal" class="p-2 hover:bg-gray-100 rounded-lg">
            <i class="fas fa-times text-gray-600"></i>
          </button>
        </div>
      </div>

      <div class="px-6 py-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
          <input type="text" id="task-title" placeholder="Enter title..." 
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea id="task-description" rows="3" placeholder="Enter description..." 
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
          <div class="relative">
            <i class="fas fa-folder absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="task-category" placeholder="Enter category..." 
              class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Priority</label>
          <div class="flex gap-2">
            <button class="priority-btn flex-1 py-2 rounded-lg border-2 text-sm font-medium border-gray-300 text-gray-600" data-priority="0">Low</button>
            <button class="priority-btn flex-1 py-2 rounded-lg border-2 text-sm font-medium bg-orange-100 border-orange-300 text-orange-700" data-priority="1">Medium</button>
            <button class="priority-btn flex-1 py-2 rounded-lg border-2 text-sm font-medium border-gray-300 text-gray-600" data-priority="2">High</button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Due Date</label>
          <div class="flex items-center gap-3">
            <input type="date" id="task-date" 
              class="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            <button id="clear-date" class="px-3 py-2.5 border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-500">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>

        <button id="save-task" class="w-full bg-purple-600 text-white py-3 rounded-xl font-medium hover:bg-purple-700 transition">
          Add Task
        </button>
      </div>
    </div>
  </div>

  <!-- Note Modal -->
  <div id="note-modal" class="hidden fixed inset-0 bg-black/50 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl">
      <div class="px-6 py-5 border-b border-gray-100">
        <div class="flex items-center justify-between">
          <h2 id="note-modal-title" class="text-xl font-bold text-gray-800">New Note</h2>
          <div class="flex items-center gap-2">
            <button id="note-pin-btn" class="hidden p-2 hover:bg-gray-100 rounded-lg" title="Pin">
              <i class="fas fa-thumbtack text-gray-600"></i>
            </button>
            <button id="note-delete-btn" class="hidden p-2 hover:bg-red-50 text-red-600 rounded-lg" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
            <button id="close-note-modal" class="p-2 hover:bg-gray-100 rounded-lg">
              <i class="fas fa-times text-gray-600"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="px-6 py-5 space-y-4">
        <input type="text" id="note-title" placeholder="Title" 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-xl font-bold">
        
        <textarea id="note-content" placeholder="Start writing..." 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none h-64"></textarea>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-lg hidden z-50 flex items-center gap-3">
    <span id="toast-message"></span>
    <button id="toast-undo" class="text-purple-400 hover:text-purple-300 font-medium hidden">Undo</button>
  </div>

  <script src="/script.js"></script>
</body>
</html>
